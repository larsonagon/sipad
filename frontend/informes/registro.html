<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de actividades – SIPAD</title>
  <link rel="stylesheet" href="/css/core/sipad-ui.css">
</head>
<body>

  <div id="header"></div>

  <main class="module-page">
    <div class="contenido-documento">

      <div class="module-header centered">
        <h1>Registro completo de actividades</h1>
        <p class="module-subtext">Listado detallado de actividades registradas en el sistema</p>
      </div>

      <!-- FILTROS -->
      <section class="card">
        <h3 style="margin:0 0 1rem;font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-secondary);">Filtros</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Dependencia</label>
            <select id="dependencia" class="form-control"><option value="">Todas</option></select>
          </div>
          <div class="form-group">
            <label>Funcionario</label>
            <select id="funcionario" class="form-control"><option value="">Todos</option></select>
          </div>
          <div class="form-group">
            <label>Fecha inicio</label>
            <input type="date" id="fechaInicio" class="form-control">
          </div>
          <div class="form-group">
            <label>Fecha fin</label>
            <input type="date" id="fechaFin" class="form-control">
          </div>
        </div>
        <div class="module-actions" style="margin-top:1rem;">
          <button class="btn-primary" id="btnConsultar">Generar informe</button>
          <button class="btn-secondary" id="btnWord">Exportar Word</button>
          <button class="btn-secondary" id="btnExcel">Exportar Excel</button>
        </div>
      </section>

      <!-- KPIs (ocultos hasta consultar) -->
      <div id="kpisContainer" style="display:none;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:1rem;">
        <div style="background:var(--bg-secondary,#f9fafb);border-radius:8px;padding:14px;">
          <p style="margin:0 0 4px;font-size:11px;color:var(--text-secondary);">Total actividades</p>
          <p id="kpiTotal" style="margin:0;font-size:24px;font-weight:600;">0</p>
        </div>
        <div style="background:var(--bg-secondary,#f9fafb);border-radius:8px;padding:14px;">
          <p style="margin:0 0 4px;font-size:11px;color:var(--text-secondary);">Analizadas</p>
          <p id="kpiAnalizadas" style="margin:0;font-size:24px;font-weight:600;">0</p>
        </div>
        <div style="background:var(--bg-secondary,#f9fafb);border-radius:8px;padding:14px;">
          <p style="margin:0 0 4px;font-size:11px;color:var(--text-secondary);">Caracterizadas</p>
          <p id="kpiCaracterizadas" style="margin:0;font-size:24px;font-weight:600;">0</p>
        </div>
        <div style="background:var(--bg-secondary,#f9fafb);border-radius:8px;padding:14px;">
          <p style="margin:0 0 4px;font-size:11px;color:var(--text-secondary);">Dependencias</p>
          <p id="kpiDependencias" style="margin:0;font-size:24px;font-weight:600;">0</p>
        </div>
      </div>

      <!-- RESULTADOS -->
      <section class="card" style="margin-top:1rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
          <h3 id="resultadosHead" style="margin:0;font-size:14px;font-weight:500;">Resultados</h3>
          <div style="display:flex;gap:6px;">
            <button id="btnWordBottom" class="btn-secondary" style="font-size:12px;padding:6px 12px;">Word</button>
            <button id="btnExcelBottom" class="btn-secondary" style="font-size:12px;padding:6px 12px;">Excel</button>
          </div>
        </div>
        <div class="table-container">
          <table class="table" id="tablaResultados">
            <thead>
              <tr>
                <th>Actividad</th>
                <th>Funcionario</th>
                <th>Dependencia</th>
                <th>Frecuencia</th>
                <th>Estado</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

    </div>
  </main>

  <script type="module" src="/informes/registro.js"></script>
  <script src="/components/password-modal.js"></script>

</body>
</html>
