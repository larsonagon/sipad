<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividades por dependencia – SIPAD</title>

<link rel="stylesheet" href="/css/core/sipad-ui.css">

<style>
.table th,
.table td {
  vertical-align: middle;
}

.table th.text-center,
.table td.text-center {
  text-align: center;
}
</style>

</head>

<body>

<div id="header"></div>

<main class="module-page">

<div class="module-header centered">
<h1>Actividades por dependencia</h1>
<p>Resumen estadístico de actividades registradas</p>
</div>

<!-- 🔥 GRAFICO -->
<div class="card" style="margin-bottom:20px">

<div class="card-header">
<h3>Comparativo por dependencia</h3>
</div>

<div class="card-body" style="display:flex;justify-content:center">
<div style="width:100%;max-width:600px">
<canvas id="graficoDependencias"></canvas>
</div>
</div>

</div>

<!-- TABLA -->
<div class="card">

<div class="table-container">

<table class="table" id="tablaDependencias">

<thead>
<tr>
<th>Dependencia</th>
<th class="text-center">Total actividades</th>
<th class="text-center">Funcionarios</th>
<th class="text-center">Analizadas</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
<script type="module" src="/informes/dependencia.js"></script>
<script src="/components/password-modal.js"></script>

</body>
</html>
