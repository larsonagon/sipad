<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividades por dependencia – SIPAD</title>

<link rel="stylesheet" href="/css/core/sipad-ui.css">

<style>

/* Alineación */
.table th,
.table td {
  vertical-align: middle;
}

.table th.text-center,
.table td.text-center {
  text-align: center;
}

/* KPI */
.kpi-container{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.kpi{
  background:#fff;
  border-radius:10px;
  padding:16px 24px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  text-align:center;
  min-width:140px;
}

.kpi h4{
  font-size:13px;
  color:#64748b;
  margin-bottom:6px;
}

.kpi span{
  font-size:22px;
  font-weight:600;
  color:#1e293b;
}

</style>

</head>

<body>

<div id="header"></div>

<main class="module-page">

<div class="module-header centered">
<h1>Actividades por dependencia</h1>
<p>Resumen estadístico de actividades registradas</p>
</div>

<!-- KPI -->
<div class="kpi-container" id="kpis"></div>

<!-- GRAFICO -->
<div class="card" style="margin-bottom:20px">

<div class="card-header">
<h3>Comparativo por dependencia</h3>
</div>

<div class="card-body" style="display:flex;justify-content:center">
<div style="width:100%;max-width:700px">
<canvas id="graficoDependencias"></canvas>
</div>
</div>

</div>

<!-- TABLA -->
<div class="card">

<div class="table-container">

<table class="table" id="tablaDependencias">

<thead>
<tr>
<th>Dependencia</th>
<th class="text-center">Total actividades</th>
<th class="text-center">Funcionarios</th>
<th class="text-center">Analizadas</th>
<th class="text-center">% Cumplimiento</th>
</tr>
</thead>

<tbody>
<tr>
<td colspan="5" class="text-center">Cargando...</td>
</tr>
</tbody>

</table>

</div>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js"></script>
<script type="module" src="/informes/dependencia.js"></script>
<script src="/components/password-modal.js"></script>

</body>
</html>
