<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Producción documental – SIPAD</title>

<link rel="stylesheet" href="/css/core/sipad-ui.css">

</head>

<body>

<div id="header"></div>

<main class="module-page">

<div class="contenido-documento">

<!-- ========================= -->
<!-- HEADER -->
<!-- ========================= -->

<div class="module-header centered">
<h1>Producción documental por actividad</h1>
<p class="module-subtext">
Documentos generados por las actividades registradas
</p>
</div>

<!-- ========================= -->
<!-- FILTROS -->
<!-- ========================= -->

<section class="card">

<div class="card-header">
<h3>Filtros</h3>
</div>

<div class="card-body form-grid">

<div class="form-group">
<label>Dependencia</label>
<select id="dependencia" class="form-control">
<option value="">Todas</option>
</select>
</div>

</div>

<div class="module-actions">

<button class="btn-primary" id="btnConsultar">
Generar informe
</button>

</div>

</section>

<!-- ========================= -->
<!-- RESULTADOS -->
<!-- ========================= -->

<section class="card" style="margin-top:30px">

<div class="card-header">
<h3>Resultados</h3>
</div>

<div class="card-body">

<div class="table-container">

<table class="table" id="tablaResultados">

<thead>

<tr>
<th>Actividad</th>
<th>Dependencia</th>
<th>Documentos generados</th>
<th class="text-center">Tipos</th>
<th>Formato</th>
<th>Volumen</th>
<th>Frecuencia</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</section>

</div>

</main>

<script type="module" src="/informes/produccion.js"></script>
<script src="/components/password-modal.js"></script>

</body>
</html>
