<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Usuarios | SIPAD</title>

<link rel="stylesheet" href="/css/core/sipad-ui.css">
<link rel="stylesheet" href="/css/modules/admin.css">

<style>

/* ampliar solo esta vista */
.module-page{
  max-width:1200px;
}

/* evitar saltos de línea en columnas importantes */
#tablaUsuarios td:nth-child(2),
#tablaUsuarios td:nth-child(3),
#tablaUsuarios td:nth-child(4),
#tablaUsuarios td:nth-child(5),
#tablaUsuarios td:nth-child(6),
#tablaUsuarios td:nth-child(7){
  white-space:nowrap;
}

/* ancho mínimo para columnas largas */
#tablaUsuarios th:nth-child(2){min-width:220px;}
#tablaUsuarios th:nth-child(3){min-width:140px;}
#tablaUsuarios th:nth-child(4){min-width:220px;}
#tablaUsuarios th:nth-child(5){min-width:140px;}
#tablaUsuarios th:nth-child(6){min-width:120px;}
#tablaUsuarios th:nth-child(7){min-width:180px;}

/* ======================================================
   MODAL USUARIOS – Solo estilos de hijos
   El contenedor (#modalUsuario) lo maneja JS inline
====================================================== */

#modalUsuario .modal-content{
  background:#fff;
  width:100%;
  max-width:560px;
  padding:22px 26px;
  border-radius:10px;
  box-shadow:0 16px 40px rgba(0,0,0,.18);
  max-height:85vh;
  overflow-y:auto;
  position:relative;
}

#modalUsuario h3{
  font-size:15px;
  font-weight:600;
  color:var(--color-primary, #0d3f77);
  margin:0 0 14px 0;
  padding-bottom:10px;
  border-bottom:1px solid #f1f3f5;
}

#modalUsuario .form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 16px;
  margin-top:0;
}

#modalUsuario .form-group{
  display:flex;
  flex-direction:column;
  margin-bottom:0;
  gap:2px;
}

#modalUsuario .form-group.full{
  grid-column:1 / -1;
}

#modalUsuario .form-group label{
  font-size:11px;
  font-weight:500;
  color:#64748b;
  text-transform:uppercase;
  letter-spacing:.3px;
}

#modalUsuario input,
#modalUsuario select{
  width:100%;
  box-sizing:border-box;
  padding:7px 10px;
  font-size:13px;
  border-radius:6px;
  border:1px solid #d0d5dd;
}

#modalUsuario input:focus,
#modalUsuario select:focus{
  border-color:var(--color-primary, #0d3f77);
  outline:none;
  box-shadow:0 0 0 2px rgba(13,63,119,.08);
}

#modalUsuario .switch-field{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  padding:2px 0;
}

#modalUsuario .modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid #f1f3f5;
}

@media (max-width:600px){
  #modalUsuario .form-grid{
    grid-template-columns:1fr;
  }
  #modalUsuario .modal-content{
    max-width:95%;
    padding:18px;
  }
}

</style>

</head>

<body>

<div id="header"></div>

<main class="module-page">

<div class="module-header centered">
<h1>Gestión de usuarios</h1>
<p>Administración de usuarios institucionales del sistema.</p>
</div>

<section class="section-actions">

<div class="actions-left">
<button id="btnNuevoUsuario" class="btn-primary">
+ Nuevo Usuario
</button>
</div>

<div class="actions-right">
<input
type="text"
id="inputBuscarUsuario"
class="input-search"
placeholder="Buscar usuario, username o email"
autocomplete="off">
</div>

</section>

<section>

<table id="tablaUsuarios" class="table">

<thead>
<tr>
<th style="width:60px;">ID</th>
<th>Nombre</th>
<th>Username</th>
<th>Email</th>
<th>Cargo</th>
<th>Nivel</th>
<th>Dependencia</th>
<th style="width:110px;">Estado</th>
<th style="width:110px;">Bloqueado</th>
<th style="width:80px;">Acciones</th>
</tr>
</thead>

<tbody></tbody>

</table>

</section>

</main>

<!-- JS controla los estilos inline de este div -->
<div id="modalUsuario" style="display:none;">

<div class="modal-content">

<h3 id="modalTitle">Nuevo Usuario</h3>

<form id="formUsuario" class="form-grid">

<input type="hidden" id="inputUsuarioId">

<div class="form-group full">
<label>Nombre Completo</label>
<input type="text" id="inputNombre" required>
</div>

<div class="form-group">
<label>Documento</label>
<input type="text" id="inputDocumento">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="inputEmail" required>
</div>

<div class="form-group">
<label>Username</label>
<input type="text" id="inputUsername" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="inputPassword">
</div>

<div class="form-group">
<label>Confirmar Password</label>
<input type="password" id="inputPasswordConfirm">
</div>

<div class="form-group">
<label>Rol</label>
<select id="selectRol" required></select>
</div>

<div class="form-group">
<label>Dependencia</label>
<select id="selectDependencia" required></select>
</div>

<div class="form-group">
<label>Cargo</label>
<select id="selectCargo" required></select>
</div>

<div class="form-group">
<label>Nivel</label>
<select id="selectNivel" required></select>
</div>

<div class="form-group full" id="grupoEstado">
<div class="switch-field">
<label class="switch">
<input type="checkbox" id="checkEstado">
<span class="slider"></span>
</label>
<span>Usuario activo</span>
</div>
</div>

<div class="form-group full" id="grupoBloqueado">
<div class="switch-field">
<label class="switch">
<input type="checkbox" id="checkBloqueado">
<span class="slider"></span>
</label>
<span>Usuario bloqueado</span>
</div>
</div>

<div class="modal-actions full">

<button type="button" id="btnCancelar" class="btn-secondary">
Cancelar
</button>

<button type="submit" class="btn-primary">
Guardar
</button>

</div>

</form>

</div>

</div>

<script type="module" src="./usuarios.js"></script>
<script src="/components/password-modal.js"></script>
<script type="module" src="/components/notifications.js"></script>

</body>
</html>
