<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ICAF – SIPAD</title>

  <!-- CORE -->
  <link rel="stylesheet" href="/css/core/sipad-ui.css">


</head>

<body>

  <main class="module-page">

    <!-- HEADER DEL MÓDULO -->
    <div class="module-header">
      <h1>Identificación técnica de actividades</h1>
      <p class="module-subtext">
        Caracterización funcional para estructuración de series documentales.
      </p>
    </div>

    <!-- CONTENIDO -->
    <div class="module-content">

      <!-- MARCO FUNCIONAL -->
      <div id="panelMarcoFuncional"></div>

      <!-- ACCIONES -->
      <div class="center-actions">
        <button id="nuevaActividad" class="btn-primary">
          + Nueva actividad
        </button>
      </div>

      <!-- MENSAJES -->
      <div id="mensaje"></div>

      <!-- TABLA -->
      <div id="tablaRegistros" class="table-container"></div>

    </div>

  </main>

  <!-- MODAL BASE -->
  <div id="modalBase" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalFooter"></div>
      <button id="cerrarModal" class="hidden"></button>
    </div>
  </div>

  <!-- MODAL PASSWORD -->
  <div id="modalPassword" class="modal hidden">
    <div class="modal-content small">

      <h3>Cambiar contraseña</h3>

      <form id="formCambiarPassword" novalidate>

        <div class="form-group">
          <label>Contraseña actual</label>
          <input type="password" id="passwordActual" required>
        </div>

        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" id="passwordNueva" required>
        </div>

        <div class="form-group">
          <label>Confirmar nueva contraseña</label>
          <input type="password" id="passwordConfirmar" required>
        </div>

        <div class="modal-actions">
          <button type="button" id="btnCancelarPassword" class="btn-secondary">
            Cancelar
          </button>

          <button type="submit" class="btn-primary">
            Actualizar contraseña
          </button>
        </div>

      </form>

    </div>
  </div>

  <!-- JS -->
  <script type="module" src="/segtec/segtec.js"></script>
  <script src="/components/password-modal.js"></script>

</body>
</html>
