<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRD-AI – Propuestas</title>

<link rel="stylesheet" href="/css/core/sipad-ui.css">
<link rel="stylesheet" href="/css/core/notifications.css">

<style>

/* Página más ancha para esta vista */
.module-page {
  max-width: 1300px !important;
}

/* ── Tabla ── */
.trd-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  font-size: 13px;
}

.trd-table th {
  text-align: left;
  padding: 11px 14px;
  border-bottom: 2px solid #e6e6e6;
  font-weight: 600;
  font-size: 12px;
  color: #555;
  letter-spacing: .2px;
  white-space: nowrap;
}

.trd-table td {
  padding: 12px 14px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: top;
}

.trd-table tr:hover td {
  background: #fafafa;
}

/* ── Columnas fijas ── */
.col-serie     { width: 160px; min-width: 140px; }
.col-subserie  { width: 200px; min-width: 160px; }
.col-cantidad  { width: 60px;  text-align: center; }
.col-tipos     { min-width: 220px; }
.col-estado    { width: 100px; text-align: center; }
.col-acciones  { width: 220px; white-space: nowrap; }

/* ── Serie ── */
.serie-nombre {
  font-size: 13px;
  font-weight: 700;
  color: #2c3e50;
  letter-spacing: .2px;
}

.subserie-texto {
  font-size: 13px;
  color: #374151;
}

/* ── Tipologías como lista ── */
.tip-lista {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.tip-lista li {
  font-size: 12px;
  color: #374151;
  padding-left: 10px;
  position: relative;
}

.tip-lista li::before {
  content: "·";
  position: absolute;
  left: 2px;
  color: #9ca3af;
}

/* ── Chips estado ── */
.estado-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .2px;
  white-space: nowrap;
}

.estado-propuesta  { background: #f1f3f5; color: #555; }
.estado-aprobada   { background: #d4edda; color: #1e7e34; }
.estado-rechazada  { background: #f8d7da; color: #842029; }

/* ── Botones acciones — mismo patrón que ICAF ── */
.trd-actions {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-wrap: nowrap;
}

.btn-aprobar {
  background: #27ae60;
  color: white;
  height: 24px;
  font-size: 12px;
  padding: 0 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
}
.btn-aprobar:hover { background: #1f8a4d; }

.btn-rechazar {
  background: #e74c3c;
  color: white;
  height: 24px;
  font-size: 12px;
  padding: 0 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
}
.btn-rechazar:hover { background: #c0392b; }

.btn-incorporar {
  background: #7c3aed;
  color: white;
  height: 24px;
  font-size: 12px;
  padding: 0 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
}
.btn-incorporar:hover { background: #6d28d9; }

.btn-editar {
  background: #f3f4f6;
  color: #374151;
  height: 24px;
  font-size: 12px;
  padding: 0 10px;
  border-radius: 6px;
  border: 1px solid #e5e7eb;
  cursor: pointer;
  font-weight: 500;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
}
.btn-editar:hover { background: #e5e7eb; }

/* ── CTA ── */
.premium-cta {
  display: flex;
  justify-content: center;
  margin: 28px 0 24px;
}

</style>

</head>

<body>

  <div id="header"></div>

  <main class="module-page">

    <div class="module-header premium-header">
      <h1>TRD-AI – Propuestas de series y subseries</h1>
      <p class="module-subtext">
        El sistema propone series y subseries documentales a partir del análisis
        de actividades identificadas en el módulo ICAF.
      </p>
    </div>

    <div class="module-content">

      <div class="premium-cta">
        <button id="btnGenerarPropuestas" class="btn-primary btn-cta"
          style="min-width:220px;font-weight:600;height:auto;padding:10px 24px;">
          Generar nuevas propuestas
        </button>
      </div>

      <div class="table-container">
        <table class="trd-table">
          <thead>
            <tr>
              <th class="col-serie">Serie documental</th>
              <th class="col-subserie">Subserie documental</th>
              <th class="col-cantidad" style="text-align:center;">Act.</th>
              <th class="col-tipos">Tipos documentales</th>
              <th class="col-estado" style="text-align:center;">Estado</th>
              <th class="col-acciones">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaPropuestas">
          </tbody>
        </table>
      </div>

    </div>

  </main>

  <script type="module" src="/trd-ai/trd-ai-propuestas.js"></script>

</body>
</html>
