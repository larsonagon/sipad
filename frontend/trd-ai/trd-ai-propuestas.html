<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRD-AI – Propuestas</title>

<link rel="stylesheet" href="/css/core/sipad-ui.css">

<style>

/* =========================
CTA PRINCIPAL
========================= */

.premium-cta{
display:flex;
justify-content:center;
align-items:center;
margin:32px 0 28px 0;
}

.premium-cta .btn-cta{
min-width:220px;
font-weight:600;
}


/* =========================
TABLA
========================= */

.table-container{
width:100%;
overflow-x:auto;
}

.trd-table{
width:100%;
border-collapse:collapse;
background:white;
}

.trd-table th{
text-align:left;
padding:12px 14px;
border-bottom:2px solid #e6e6e6;
font-weight:600;
font-size:13px;
color:#555;
letter-spacing:.2px;
}

.trd-table td{
padding:14px;
border-bottom:1px solid #f0f0f0;
font-size:13px;
vertical-align:middle;
}

.trd-table tr:hover{
background:#fafafa;
}


/* =========================
SERIE / SUBSERIE
========================= */

.serie-nombre{
font-size:14px;
font-weight:600;
color:#2c3e50;
letter-spacing:.2px;
}

.subserie{
font-size:13px;
color:#6b7280;
}

.actividades-count{
font-size:13px;
font-weight:500;
color:#374151;
}


/* =========================
ACCIONES
========================= */

.trd-actions{
display:flex;
gap:6px;
flex-wrap:nowrap;
align-items:center;
}


/* =========================
BOTONES
========================= */

.trd-actions button{
padding:6px 12px;
border-radius:6px;
font-size:12px;
font-weight:600;
border:none;
cursor:pointer;
transition:all .15s ease;
white-space:nowrap;
}

/* aprobar */

.btn-aprobar{
background:#27ae60;
color:white;
}

.btn-aprobar:hover{
background:#1f8a4d;
}

/* rechazar */

.btn-rechazar{
background:#e74c3c;
color:white;
}

.btn-rechazar:hover{
background:#c0392b;
}

/* retención */

.btn-retencion{
background:#2c7be5;
color:white;
}

.btn-retencion:hover{
background:#1a68d1;
}


/* =========================
CHIPS ESTADO
========================= */

.estado-chip{
display:inline-block;
padding:4px 10px;
border-radius:14px;
font-size:11px;
font-weight:600;
letter-spacing:.2px;
white-space:nowrap;
}

.estado-propuesta{
background:#f1f3f5;
color:#555;
}

.estado-aprobada{
background:#d4edda;
color:#1e7e34;
}

.estado-rechazada{
background:#f8d7da;
color:#842029;
}


/* =========================
CABECERA
========================= */

.module-header h1{
font-size:22px;
font-weight:600;
color:#2c3e50;
}

.module-subtext{
font-size:14px;
color:#6b7280;
max-width:640px;
margin:auto;
}

</style>

</head>

<body>

<div id="header"></div>

<main class="module-page">

<div class="module-header premium-header">

<h1>TRD-AI – Propuestas de series y subseries</h1>

<p class="module-subtext">
El sistema propone series y subseries documentales a partir del análisis
de actividades identificadas en el módulo ICAF.
</p>

</div>


<div class="module-content">

<div class="premium-cta">

<button
id="btnGenerarPropuestas"
class="btn-primary btn-cta">

Generar nuevas propuestas

</button>

</div>


<div class="table-container">

<table class="trd-table">

<thead>

<tr>

<th>Serie documental</th>
<th>Subserie documental</th>
<th>Actividades origen</th>
<th>Estado</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaPropuestas">

<!-- render JS -->

</tbody>

</table>

</div>

</div>

</main>


<script type="module" src="/trd-ai/trd-ai-propuestas.js"></script>

</body>
</html>
