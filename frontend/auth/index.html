<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIPAD – Sistema inteligente para la planeación archivística documental</title>

<!-- CSS LOGIN -->
<link rel="stylesheet" href="/auth/index.css">

<!-- CSS GLOBAL SIPAD -->
<link rel="stylesheet" href="/css/core/sipad-ui.css">

</head>

<body>

<div class="login-page">

  <div class="login-wrapper">

    <div class="login-brand">
      <h1>SIPAD</h1>
      <span>Sistema inteligente para la planeación archivística documental</span>
    </div>

    <div class="login-card">

      <h2 class="login-title">Ingreso al sistema</h2>

      <form id="loginForm">

        <div class="login-field">
          <input
            type="text"
            id="usuario"
            placeholder="Usuario"
            required>
        </div>

        <div class="login-field">
          <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required>
        </div>

        <button type="submit" class="login-button">
          Ingresar
        </button>

        <div id="mensaje" class="login-message"></div>

      </form>

    </div>

  </div>

</div>

<!-- FOOTER DINÁMICO -->
<script type="module">
  import { renderFooter } from '/components/footer.js'
  renderFooter()
</script>

<!-- JS -->
<script src="/auth/index.js" defer></script>
<script src="/components/password-modal.js" defer></script>

</body>
</html>
