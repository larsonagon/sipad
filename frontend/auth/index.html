<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIPAD – Sistema inteligente para la planeación archivística documental</title>

<!-- CSS LOGIN -->
<link rel="stylesheet" href="/auth/index.css">

<!-- CSS GLOBAL SIPAD -->
<link rel="stylesheet" href="/css/core/sipad-ui.css">

</head>

<body>

<!-- ========================= -->
<!-- CONTENIDO LOGIN -->
<!-- ========================= -->

<div class="login-page">

  <div class="login-wrapper">

    <div class="login-brand">
      <h1>SIPAD</h1>
      <span>Sistema inteligente para la planeación archivística documental</span>
    </div>

    <div class="login-card">

      <h2 class="login-title">Ingreso al sistema</h2>

      <form id="loginForm">

        <div class="login-field">
          <input
            type="text"
            id="usuario"
            placeholder="Usuario"
            autocomplete="username"
            required>
        </div>

        <div class="login-field">
          <input
            type="password"
            id="password"
            placeholder="Contraseña"
            autocomplete="current-password"
            required>
        </div>

        <button type="submit" class="login-button">
          Ingresar
        </button>

        <div id="mensaje" class="login-message"></div>

      </form>

    </div>

  </div>

</div>

<!-- ========================= -->
<!-- FOOTER (MANUAL Y CORRECTO) -->
<!-- ========================= -->

<footer class="sipad-footer">
  <div class="sipad-footer-inner">
    <span>SIPAD – Sistema inteligente para la planeación archivística documental</span>
    <span class="sipad-dev">© 2026 · Desarrollado por Larson Agón</span>
  </div>
</footer>

<!-- ========================= -->
<!-- JS LOGIN -->
<!-- ========================= -->

<script src="/auth/index.js" defer></script>
<script src="/components/password-modal.js" defer></script>

</body>
</html>
